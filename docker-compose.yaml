services:
  data-warehouse:
    image: postgres:13
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - warehouse-volume:/var/lib/postgressql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d warehouse"]
      interval: 1m30s
      timeout: 10s
      retries: 5
      start_period: 5s

#  ingesta-datos:
#    image: ingesta-datos
#    build: .
#    depends_on:
#      data-warehouse:
#        condition: service_healthy
  
  warehouse-ui:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=enaunay@gmail.com
      - PGADMIN_DEFAULT_PASSWORD=root
    ports:
      - "9000:80"
    volumes:
      - data-ui-volume:/var/lib/pgadmin
  
  orquestador:
    image: mageai/mageai
    env_file:
      - .env
    volumes:
      - ./mage-volume/orquestador:/home/src/orquestador
      - ./mage-volume/mage_data:/home/src/mage_data
    ports:
      - "6789:6789"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
    command: /app/run_app.sh mage start orquestador

volumes:
  warehouse-volume:
  data-ui-volume: